<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Messenger — Nanovate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1877F2;
            --bg: #6D68D0; /* Purple background from screenshot */
            --text-main: #1C1E21;
            --text-sub: #65676B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 80px 48px;
            max-width: 680px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            color: #0052ff;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #8c96a3;
            font-size: 18px;
            margin-bottom: 56px;
        }

        h1 {
            font-size: 32px;
            color: #111827;
            margin-bottom: 24px;
            font-weight: 700;
        }

        p {
            color: #8c96a3;
            font-size: 19px;
            margin-bottom: 64px;
            line-height: 1.6;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 14px;
            color: #b91c1c;
            font-size: 15px;
            line-height: 1.5;
            margin: 0 auto 24px;
            max-width: 520px;
            padding: 16px 18px;
            text-align: left;
        }

        .btn-facebook {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #1877F2;
            color: white;
            padding: 20px 48px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
            max-width: 380px;
        }

        .btn-facebook:hover {
            background: #166fe5;
        }

        .btn-facebook svg {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">nanovate.io</div>
        <div class="subtitle">AI Agent Platform</div>
        
        <h1>Connect Your Messenger</h1>
        <p>Allow Nanovate to connect your Facebook Page to your AI agent. Your agent will be able to send and receive messages automatically.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <a href="/connect" class="btn-facebook">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.936 1.444 5.56 3.7 7.29V22l3.37-1.86c.9.25 1.856.386 2.845.386 5.523 0 10-4.145 10-9.243S17.523 2 12 2z" />
            </svg>
            Connect with Facebook
        </a>

        <a href="/instagram/connect" class="btn-facebook" style="background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); margin-top: 16px;">
            Connect with Instagram
        </a>
    </div>
</body>
</html>
