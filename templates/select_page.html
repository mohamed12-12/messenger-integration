<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Asset — Nanovate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #6D68D0;
            --text-main: #111827;
            --text-sub: #6B7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h1 { font-size: 28px; margin-bottom: 8px; color: var(--text-main); }
        .desc { color: var(--text-sub); margin-bottom: 40px; font-size: 16px; }

        .page-list { display: flex; flex-direction: column; gap: 16px; }

        .page-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }

        .page-item:hover { border-color: #3b82f6; background: #f3f4f6; }

        .page-info { display: flex; align-items: center; gap: 16px; text-align: left; }

        .page-avatar {
            width: 48px; height: 48px;
            background: #3b82f6; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 20px;
        }

        .page-name { font-weight: 600; font-size: 17px; margin-bottom: 2px; }
        .page-id { font-size: 12px; color: var(--text-sub); font-family: monospace; }

        .select-icon { color: #3b82f6; width: 24px; height: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Asset Selection</h1>
        <p class="desc">Please select the Facebook Page you want to connect.</p>

        <div class="page-list">
            {% for page in pages %}
            <a href="/connect-page/{{ page.id }}" class="page-item" id="page-{{ page.id }}">
                <div class="page-info">
                    <div class="page-avatar">{{ page.name[0] | upper }}</div>
                    <div>
                        <div class="page-name">{{ page.name }}</div>
                        <div class="page-id">ID: {{ page.id }}</div>
                    </div>
                </div>
                <div class="select-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </a>
            {% else %}
            <div style="padding: 40px; color: #ef4444;">No pages found. Ensure permissions were granted.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
