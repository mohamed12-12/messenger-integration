<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Instagram — Nanovate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E1306C;
            --bg: #6D68D0;
            --text-main: #1C1E21;
            --text-sub: #65676B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 80px 48px;
            max-width: 680px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            color: #0052ff;
            margin-bottom: 4px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #8c96a3;
            font-size: 18px;
            margin-bottom: 56px;
        }

        h1 {
            font-size: 32px;
            color: #111827;
            margin-bottom: 24px;
            font-weight: 700;
        }

        p {
            color: #8c96a3;
            font-size: 19px;
            margin-bottom: 64px;
            line-height: 1.6;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-instagram {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            padding: 20px 48px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            transition: opacity 0.2s;
            width: 100%;
            max-width: 420px;
        }

        .btn-instagram:hover {
            opacity: 0.9;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">nanovate.io</div>
        <div class="subtitle">AI Agent Platform</div>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <h1>Connect Your Instagram</h1>
        <p>Connect your Instagram Business Account to enable AI-powered messaging. To connect, your Instagram account must be linked to a Facebook Page.</p>
        
        <a href="/instagram/connect" class="btn-instagram">
            Connect Instagram Business
        </a>
    </div>
</body>
</html>
