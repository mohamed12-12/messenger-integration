<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <title>Nanovate — Connected!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 60px 48px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #1A56DB;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 26px;
            color: #065F46;
            margin-bottom: 12px;
        }

        .page-name {
            font-size: 18px;
            color: #111827;
            font-weight: 600;
            margin: 16px 0 4px;
        }

        .page-id {
            color: #9CA3AF;
            font-size: 13px;
            margin-bottom: 32px;
        }

        p {
            color: #6B7280;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class='card'>
        <div class='logo'>nanovate.io</div>
        <div class='icon'>✅</div>
        <h1>Successfully Connected!</h1>
        <div class='page-name'>{{ page_name }}</div>
        <div class='page-id'>Page ID: {{ page_id }}</div>
        <p>Your Facebook Messenger is now linked to your
            AI agent. Your agent will start handling messages
            automatically.</p>
    </div>
</body>

</html>
