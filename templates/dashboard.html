<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Nanovate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #6D68D0;
            --text-main: #111827;
            --text-sub: #6B7280;
            --primary: #1877F2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            padding: 40px;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .page-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 40px;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .desc {
            color: var(--text-sub);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input,
        textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-send:hover {
            background: #166fe5;
            transform: translateY(-1px);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .activity-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .activity-card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 16px;
        }

        .msg-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-item {
            padding: 12px;
            background: #f9fafb;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .msg-item:hover {
            transform: translateX(4px);
        }

        .msg-item.is-reply {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .msg-item .psid {
            font-size: 11px;
            font-family: monospace;
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }

        .msg-item.is-reply .psid {
            color: #15803d;
            text-decoration: none;
            cursor: default;
        }

        .msg-item .text {
            font-size: 13px;
            margin-top: 4px;
            color: #374151;
        }

        .result-box {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            display: none;
        }

        .result-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbfcce;
            font-size: 14px;
        }

        .result-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            font-size: 14px;
        }

        /* Automation Toggle Styling */
        .automation-hub {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-info b {
            font-size: 15px;
            color: #1e293b;
            display: block;
        }

        .toggle-info span {
            font-size: 12px;
            color: #64748b;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            background: #94a3b8;
        }

        .status-active .status-dot {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">nanovate.io</div>
        <div class="page-badge">Connected: {{ page_name }}</div>
    </div>

    <main>
        <div class="container">
            <div class="card">
                <div class="automation-hub" id="automationStatus">
                    <div class="toggle-container">
                        <div class="toggle-info">
                            <b>AI Auto-Responder</b>
                            <span id="autoStatusText">Status: Inactive</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="autoToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <h2>Live Send Action</h2>
                <p class="desc">Send a manual response to a customer on Facebook Messenger.</p>

                <form id="sendForm">
                    <div class="form-group">
                        <label for="recipient_id">Recipient PSID</label>
                        <input type="text" id="recipient_id" name="recipient_id" placeholder="Copy PSID from the feed"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message Response</label>
                        <textarea id="message" name="message" rows="4" placeholder="Type your message here..."
                            required></textarea>
                    </div>
                    <button type="submit" class="btn-send" id="btn-submit">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                        Send Message Now
                    </button>
                </form>

                <div id="result" class="result-box"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="activity-card">
                <h3>Incoming Events (Live)</h3>
                <div id="msg-feed" class="msg-list">
                    <div
                        style="text-align: center; color: #9ca3af; padding: 20px; border: 1px dashed #e5e7eb; border-radius: 10px; font-size: 13px;">
                        Waiting for messages...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('sendForm');
        const btn = document.getElementById('btn-submit');
        const result = document.getElementById('result');
        const feed = document.getElementById('msg-feed');
        const autoToggle = document.getElementById('autoToggle');
        const autoStatusText = document.getElementById('autoStatusText');
        const automationStatus = document.getElementById('automationStatus');

        function copyPSID(id) { document.getElementById('recipient_id').value = id; }

        // Fetch Config
        async function fetchConfig() {
            try {
                const res = await fetch('/api/config');
                const cfg = await res.json();
                autoToggle.checked = cfg.auto_response;
                updateStatusUI(cfg.auto_response);
            } catch (err) { }
        }

        function updateStatusUI(active) {
            if (active) {
                automationStatus.className = 'automation-hub status-active';
                autoStatusText.innerHTML = '<span class="status-dot"></span> Status: Active (AI responding)';
            } else {
                automationStatus.className = 'automation-hub';
                autoStatusText.innerHTML = '<span class="status-dot"></span> Status: Inactive';
            }
        }

        autoToggle.onchange = async () => {
            try {
                const res = await fetch('/api/toggle-auto-response', { method: 'POST' });
                const cfg = await res.json();
                updateStatusUI(cfg.auto_response);
            } catch (err) {
                autoToggle.checked = !autoToggle.checked;
            }
        }

        async function updateFeed() {
            try {
                const response = await fetch('/api/recent-messages');
                const messages = await response.json();
                if (messages.length === 0) return;
                feed.innerHTML = messages.map(m => `
                    <div class="msg-item ${m.is_reply ? 'is-reply' : ''}">
                        <div class="psid" ${m.is_reply ? '' : `onclick="copyPSID('${m.sender_id}')" title="Click to copy PSID"`}>
                            ${m.is_reply ? 'NANAVATE BOT' : `PSID: ${m.sender_id}`}
                        </div>
                        <div class="text">"${m.text}"</div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        setInterval(updateFeed, 3000);
        updateFeed();
        fetchConfig();

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = 'Sending...';
            const formData = new FormData(form);
            try {
                const response = await fetch('/send-message', { method: 'POST', body: formData });
                const data = await response.json();
                result.style.display = 'block';
                if (data.success) {
                    result.className = 'result-box result-success';
                    result.innerHTML = `<strong>Success!</strong> Message ID: ${data.result.message_id}`;
                } else {
                    result.className = 'result-box result-error';
                    const msg = data.error?.error?.message || JSON.stringify(data.error);
                    result.innerHTML = `<strong>Error:</strong> ${msg}`;
                }
            } catch (err) {
                result.style.display = 'block';
                result.className = 'result-box result-error';
                result.innerHTML = `<strong>Error:</strong> ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Message Now';
            }
        }
    </script>
</body>

</html>
