<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Nanovate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #6D68D0;
            --text-main: #111827;
            --text-sub: #6B7280;
            --primary: #1877F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            padding: 40px;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .page-badge { 
            background: rgba(255, 255, 255, 0.2); 
            padding: 8px 16px; border-radius: 20px; 
            font-size: 14px; font-weight: 600; 
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 40px;
        }

        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h2 { font-size: 24px; margin-bottom: 8px; color: var(--text-main); }
        .desc { color: var(--text-sub); margin-bottom: 32px; font-size: 16px; }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--text-main); }
        input, textarea {
            width: 100%; padding: 16px; border: 1px solid #e5e7eb;
            border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--primary); }

        .btn-send {
            background: var(--primary); color: white; border: none;
            padding: 18px 32px; border-radius: 12px; font-weight: 700;
            font-size: 16px; cursor: pointer; width: 100%; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-send:hover { background: #166fe5; transform: translateY(-1px); }

        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .activity-card {
            background: white; border-radius: 20px; padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .activity-card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sub); margin-bottom: 16px; }

        .msg-list { display: flex; flex-direction: column; gap: 12px; }
        .msg-item { padding: 12px; background: #f9fafb; border-radius: 12px; border-left: 4px solid var(--primary); }
        .msg-item .psid { font-size: 11px; font-family: monospace; color: var(--primary); cursor: pointer; text-decoration: underline; font-weight: 600; }
        .msg-item .text { font-size: 13px; margin-top: 4px; color: #374151; }

        .result-box { margin-top: 24px; padding: 16px; border-radius: 12px; display: none; }
        .result-success { background: #dcfce7; color: #166534; border: 1px solid #bbfcce; font-size: 14px; }
        .result-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; font-size: 14px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">nanovate.io</div>
        <div class="page-badge">Connected: {{ page_name }}</div>
    </div>

    <main>
        <div class="container">
            <div class="card">
                <h2>Live Send Action</h2>
                <p class="desc">Send a response to a customer on Facebook Messenger.</p>
                
                <form id="sendForm">
                    <div class="form-group">
                        <label for="recipient_id">Recipient PSID</label>
                        <input type="text" id="recipient_id" name="recipient_id" placeholder="Copy PSID from the feed" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message Response</label>
                        <textarea id="message" name="message" rows="4" placeholder="Type your message here..." required></textarea>
                    </div>
                    <button type="submit" class="btn-send" id="btn-submit">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                        Send Message Now
                    </button>
                </form>

                <div id="result" class="result-box"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="activity-card">
                <h3>Incoming Events (Live)</h3>
                <div id="msg-feed" class="msg-list">
                    <div style="text-align: center; color: #9ca3af; padding: 20px; border: 1px dashed #e5e7eb; border-radius: 10px; font-size: 13px;">Waiting for messages...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('sendForm');
        const btn = document.getElementById('btn-submit');
        const result = document.getElementById('result');
        const feed = document.getElementById('msg-feed');

        function copyPSID(id) { document.getElementById('recipient_id').value = id; }

        async function updateFeed() {
            try {
                const response = await fetch('/api/recent-messages');
                const messages = await response.json();
                if (messages.length === 0) return;
                feed.innerHTML = messages.map(m => `
                    <div class="msg-item">
                        <div class="psid" onclick="copyPSID('${m.sender_id}')" title="Click to copy PSID">PSID: ${m.sender_id}</div>
                        <div class="text">"${m.text}"</div>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        setInterval(updateFeed, 3000);
        updateFeed();

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = 'Sending...';
            const formData = new FormData(form);
            try {
                const response = await fetch('/send-message', { method: 'POST', body: formData });
                const data = await response.json();
                result.style.display = 'block';
                if (data.success) {
                    result.className = 'result-box result-success';
                    result.innerHTML = `<strong>Success!</strong> Message ID: ${data.result.message_id}`;
                } else {
                    result.className = 'result-box result-error';
                    const msg = data.error?.error?.message || JSON.stringify(data.error);
                    result.innerHTML = `<strong>Error:</strong> ${msg}`;
                }
            } catch (err) {
                result.style.display = 'block';
                result.className = 'result-box result-error';
                result.innerHTML = `<strong>Error:</strong> ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Message Now';
            }
        }
    </script>
</body>
</html>
